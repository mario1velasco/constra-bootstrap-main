
<!doctype html>
<html lang="es">
  <head>
    <!-- Basic Page Needs
================================================== -->
    <meta charset="utf-8" />
    <title>@@title</title>

    <!-- Mobile Specific Metas
================================================== -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="@@description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta property="og:title" content="@@title" />
    <meta property="og:description" content="@@description" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="images/new/logo-mini.webp" />

    <!-- Favicon
================================================== -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- Preconnect to external resources for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload critical images for LCP -->
    <link rel="preload" as="image" href="images/new/guy-white.webp">

    <!-- Preload critical FontAwesome fonts -->
    <link rel="preload" as="font" href="plugins/fontawesome/webfonts/fa-solid-900.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="plugins/fontawesome/webfonts/fa-brands-400.woff2" type="font/woff2" crossorigin>

    <!-- CSS
================================================== -->
    <!-- Template styles - Critical path (minimal above-fold styles) -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Load Bootstrap asynchronously to prevent render-blocking -->
    <link rel="preload" as="style" href="plugins/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css"></noscript>

    <!-- Load FontAwesome asynchronously to prevent render-blocking -->
    <link rel="preload" as="style" href="plugins/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="plugins/fontawesome/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="plugins/fontawesome/css/all.min.css"></noscript>

    <!-- Load Slick Carousel asynchronously to prevent render-blocking -->
    <link rel="preload" as="style" href="plugins/slick/slick.css">
    <link rel="stylesheet" href="plugins/slick/slick.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="plugins/slick/slick.css"></noscript>

    <link rel="preload" as="style" href="plugins/slick/slick-theme.css">
    <link rel="stylesheet" href="plugins/slick/slick-theme.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="plugins/slick/slick-theme.css"></noscript>

    <!-- Load Google Fonts asynchronously to prevent render-blocking (900ms savings!) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Open+Sans:400,600&subset=latin-ext&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Open+Sans:400,600&subset=latin-ext&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Open+Sans:400,600&subset=latin-ext&display=swap"></noscript>

    <!-- ! Defer non-critical CSS -->
    <link rel="stylesheet" href="plugins/animate-css/animate.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="plugins/animate-css/animate.css" /></noscript>

    <link rel="stylesheet" href="plugins/colorbox/colorbox.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="plugins/colorbox/colorbox.css" /></noscript>

    <!-- SEO Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "RENOVARTE",
        "description": "Empresa de reformas en Santiago de Compostela y área metropolitana.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Rúa Ameneiral, 10",
          "addressLocality": "Bertamiráns",
          "postalCode": "15220",
          "addressRegion": "A Coruña",
          "addressCountry": "ES"
        },
        "telephone": "+34613963660",
        "email": "renovartereforma@gmail.com",
        "areaServed": "Santiago de Compostela",
        "priceRange": "€",
        "sameAs": ["https://www.instagram.com/renovartereforma"]
      }
    </script>
  </head>
  <body>
    <div class="body-inner">
      <div id="top-bar" class="top-bar">
        <div class="container">
          <div class="row">
            <div class="col-lg-8 col-md-8">
              <ul class="top-info text-center text-md-left">
                <li>
                  <i class="fas fa-map-marker-alt"></i>
                  <p class="info-text">
                    Rúa Ameneiral, 10 - Bertamiráns (Ames) - Santiago de
                    Compostela
                  </p>
                </li>
              </ul>
            </div>
            <!--/ Top info end -->

            <div class="col-lg-4 col-md-4 top-social text-center text-md-right">
              <ul class="list-unstyled">
                <li>
                  <a href="tel:+34613963660" aria-label="phone">
                    <i class="fas fa-phone"></i>
                  </a>
                </li>
                <li>
                  <a
                    href="mailto:renovartereforma@gmail.com"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <i class="fas fa-envelope"></i>
                  </a>
                </li>
                <li>
                  <a
                    title="Instagram"
                    href="https://instagram.com/renovartereforma"
                  >
                    <span class="social-icon"
                      ><i class="fab fa-instagram"></i
                    ></span>
                  </a>
                </li>
              </ul>
            </div>
            <!--/ Top social end -->
          </div>
          <!--/ Content row end -->
        </div>
        <!--/ Container end -->
      </div>
      <!--/ Topbar end -->
    </div>
  </body>
</html>
