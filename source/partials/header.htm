<!doctype html>
<html lang="es">
  <head>
    <!-- Basic Page Needs
================================================== -->
    <meta charset="utf-8" />
    <title>@@title</title>

    <!-- Mobile Specific Metas
================================================== -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="@@description" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta property="og:title" content="@@title" />
    <meta property="og:description" content="@@description" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="images/new/logo-white.jpg" />

    <!-- Favicon
================================================== -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!-- CSS
================================================== -->
    <!-- Bootstrap -->
    <link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="plugins/fontawesome/css/all.min.css" />
    <!-- Animation -->
    <link rel="stylesheet" href="plugins/animate-css/animate.css" />
    <!-- slick Carousel -->
    <link rel="stylesheet" href="plugins/slick/slick.css" />
    <link rel="stylesheet" href="plugins/slick/slick-theme.css" />
    <!-- Colorbox -->
    <link rel="stylesheet" href="plugins/colorbox/colorbox.css" />
    <!-- Template styles-->
    <link rel="stylesheet" href="css/style.css" />

    <!-- SEO Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "RENOVARTE",
        "description": "Empresa de reformas en Santiago de Compostela y área metropolitana.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Rúa Ameneiral, 10",
          "addressLocality": "Bertamiráns",
          "postalCode": "15220",
          "addressRegion": "A Coruña",
          "addressCountry": "ES"
        },
        "telephone": "+34613963660",
        "email": "renovartereforma@gmail.com",
        "areaServed": "Santiago de Compostela",
        "priceRange": "€",
        "sameAs": ["https://www.instagram.com/renovartereforma"]
      }
    </script>
  </head>
  <body>
    <div class="body-inner">
      <div id="top-bar" class="top-bar">
        <div class="container">
          <div class="row">
            <div class="col-lg-8 col-md-8">
              <ul class="top-info text-center text-md-left">
                <li>
                  <i class="fas fa-map-marker-alt"></i>
                  <p class="info-text">
                    Rúa Ameneiral, 10 - Bertamiráns (Ames) - Santiago de
                    Compostela
                  </p>
                </li>
              </ul>
            </div>
            <!--/ Top info end -->

            <div class="col-lg-4 col-md-4 top-social text-center text-md-right">
              <ul class="list-unstyled">
                <li>
                  <a href="tel:+34613963660" aria-label="phone">
                    <i class="fas fa-phone"></i>
                  </a>
                </li>
                <li>
                  <a
                    href="mailto:renovartereforma@gmail.com"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    <i class="fas fa-envelope"></i>
                  </a>
                </li>
                <li>
                  <a
                    title="Instagram"
                    href="https://instagram.com/renovartereforma"
                  >
                    <span class="social-icon"
                      ><i class="fab fa-instagram"></i
                    ></span>
                  </a>
                </li>
              </ul>
            </div>
            <!--/ Top social end -->
          </div>
          <!--/ Content row end -->
        </div>
        <!--/ Container end -->
      </div>
      <!--/ Topbar end -->
    </div>
  </body>
</html>
